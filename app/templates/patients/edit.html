{% extends "base.html" %}

{% block title %}Editar Paciente{% endblock %}

{% block content %}
<div class="row justify-content-center fade-in-up">
    <div class="col-md-6 col-lg-5">
        <div class="card-scientific p-4 p-md-5">
            <div class="text-center mb-4">
                <i class="fas fa-user-edit fa-3x" style="color: var(--accent-cyan);"></i>
                <h2 class="text-white mt-2">Editar Paciente</h2>
                <p class="text-muted">Atualize os Dados do Paciente</p>
            </div>

            <form method="POST">
                <div class="mb-3">
                    <label class="form-label">
                        <i class="fas fa-user me-2"></i>Nome Completo *
                    </label>
                    <input type="text" class="form-control form-control-scientific" name="name"
                        value="{{ patient.name }}" required autofocus>
                </div>

                <div class="mb-3">
                    <label class="form-label">
                        <i class="fas fa-id-card me-2"></i>BI / NIF
                    </label>
                    <input type="text" class="form-control form-control-scientific" name="identification"
                        value="{{ patient.identification or '' }}" placeholder="Ex: 009876543LA042">
                    <small class="text-muted">Documento de Identificação (único por paciente)</small>
                </div>

                <div class="mb-3">
                    <label class="form-label">
                        <i class="fas fa-calendar me-2"></i>Idade
                    </label>
                    <input type="number" class="form-control form-control-scientific" name="age"
                        value="{{ patient.age or '' }}" min="0" max="150">
                </div>

                <div class="mb-3">
                    <label class="form-label">
                        <i class="fas fa-venus-mars me-2"></i>Sexo
                    </label>
                    <select class="form-control form-control-scientific" name="gender">
                        <option value="">Selecione...</option>
                        <option value="Masculino" {% if patient.gender=='Masculino' %}selected{% endif %}>Masculino
                        </option>
                        <option value="Feminino" {% if patient.gender=='Feminino' %}selected{% endif %}>Feminino
                        </option>
                        <option value="Outro" {% if patient.gender=='Outro' %}selected{% endif %}>Outro</option>
                    </select>
                </div>

                <div class="mb-4">
                    <label class="form-label">
                        <i class="fas fa-phone me-2"></i>Contacto
                    </label>
                    <input type="text" class="form-control form-control-scientific" name="contact"
                        value="{{ patient.contact or '' }}">
                </div>

                <div class="d-flex gap-3">
                    <button type="submit" class="btn btn-scientific flex-grow-1">
                        <i class="fas fa-save me-2"></i>Atualizar
                    </button>
                    <a href="{{ url_for('patient.view_patient', patient_id=patient.id) }}"
                        class="btn btn-outline-scientific">
                        <i class="fas fa-times me-2"></i>Cancelar
                    </a>
                </div>
            </form>

            <hr class="my-4" style="border-color: rgba(0,180,216,0.3);">

            <!-- Eliminar Paciente -->
            <div class="text-center">
                <form method="POST" action="{{ url_for('patient.delete_patient', patient_id=patient.id) }}"
                    onsubmit="return confirm('Tem certeza que deseja eliminar este paciente? Esta ação não pode ser desfeita.');">
                    <button type="submit" class="btn btn-outline-danger w-100">
                        <i class="fas fa-trash-alt me-2"></i>Eliminar Paciente
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
