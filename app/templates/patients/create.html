{% extends "base.html" %}

{% block title %}Novo Paciente{% endblock %}

{% block content %}
<div class="row justify-content-center fade-in-up">
    <div class="col-md-6 col-lg-5">
        <div class="card-scientific p-4 p-md-5">
            <div class="text-center mb-4">
                <i class="fas fa-user-plus fa-3x" style="color: var(--accent-cyan);"></i>
                <h2 class="text-white mt-2">Novo Paciente</h2>
                <p class="text-muted">Registe um novo paciente no sistema</p>
            </div>

            <form method="POST">
                <div class="mb-3">
                    <label class="form-label">
                        <i class="fas fa-user me-2"></i>Nome Completo *
                    </label>
                    <input type="text" class="form-control form-control-scientific" name="name"
                        placeholder="Ex: Maria Santos" required autofocus>
                </div>

                <div class="mb-3">
                    <label class="form-label">
                        <i class="fas fa-id-card me-2"></i>BI / NIF
                    </label>
                    <input type="text" class="form-control form-control-scientific" name="identification"
                        placeholder="Ex: 009876543LA042">
                    <small class="text-muted">Documento de identificação (opcional, mas único)</small>
                </div>

                <div class="mb-3">
                    <label class="form-label">
                        <i class="fas fa-calendar me-2"></i>Idade
                    </label>
                    <input type="number" class="form-control form-control-scientific" name="age" placeholder="Ex: 35"
                        min="0" max="150">
                </div>

                <div class="mb-3">
                    <label class="form-label">
                        <i class="fas fa-venus-mars me-2"></i>Sexo
                    </label>
                    <select class="form-control form-control-scientific" name="gender">
                        <option value="">Selecione...</option>
                        <option value="Masculino">Masculino</option>
                        <option value="Feminino">Feminino</option>
                        <option value="Outro">Outro</option>
                    </select>
                </div>

                <div class="mb-4">
                    <label class="form-label">
                        <i class="fas fa-phone me-2"></i>Contacto
                    </label>
                    <input type="text" class="form-control form-control-scientific" name="contact"
                        placeholder="Ex: 923456789">
                </div>

                <div class="d-flex gap-3">
                    <button type="submit" class="btn btn-scientific flex-grow-1">
                        <i class="fas fa-save me-2"></i>Guardar Paciente
                    </button>
                    <a href="{{ url_for('patient.list_patients') }}" class="btn btn-outline-scientific">
                        <i class="fas fa-times me-2"></i>Cancelar
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
