{% extends "base.html" %}

{% block title %}Nova Consulta{% endblock %}

{% block content %}
<div class="row justify-content-center fade-in-up">
    <div class="col-md-8 col-lg-7">
        <div class="card-scientific p-4 p-md-5">
            <div class="text-center mb-4">
                <i class="fas fa-stethoscope fa-3x" style="color: var(--accent-cyan);"></i>
                <h2 class="text-white mt-2">Nova Consulta</h2>
                <p class="text-muted">
                    Paciente: <strong class="text-info">{{ patient.name }}</strong>
                    {% if patient.identification %} ({{ patient.identification }}){% endif %}
                </p>
            </div>

            <form method="POST">
                <div class="mb-3">
                    <label class="form-label">
                        <i class="fas fa-notes-medical me-2"></i>Sintomas *
                    </label>
                    <textarea class="form-control form-control-scientific" name="symptoms" rows="4"
                        placeholder="Descreva os sintomas do paciente..." required></textarea>
                    <small class="text-muted">Ex: febre alta, dor de cabeça, calafrios, tosse seca</small>
                </div>

                <div class="mb-3">
                    <label class="form-label">
                        <i class="fas fa-heartbeat me-2"></i>Sinais Vitais
                    </label>
                    <input type="text" class="form-control form-control-scientific" name="vital_signs"
                        placeholder="Ex: Temperatura: 38.5°C, Pressão: 120/80, Pulso: 90">
                </div>

                <div class="mb-4">
                    <label class="form-label">
                        <i class="fas fa-eye me-2"></i>Observações
                    </label>
                    <textarea class="form-control form-control-scientific" name="observations" rows="3"
                        placeholder="Observações adicionais do médico..."></textarea>
                </div>

                <div class="d-flex gap-3">
                    <button type="submit" class="btn btn-scientific flex-grow-1">
                        <i class="fas fa-play me-2"></i>Iniciar Consulta
                    </button>
                    <a href="{{ url_for('patient.view_patient', patient_id=patient.id) }}"
                        class="btn btn-outline-scientific">
                        <i class="fas fa-times me-2"></i>Cancelar
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
