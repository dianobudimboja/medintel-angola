{% extends "base.html" %}

{% block title %}500 - Erro Interno{% endblock %}

{% block content %}
<div class="row justify-content-center text-center fade-in-up">
    <div class="col-md-8 col-lg-7">
        <div class="card-scientific p-5">
            <div class="mb-4">
                <i class="fas fa-exclamation-triangle fa-4x" style="color: var(--warning-orange);"></i>
            </div>
            <h1 class="display-1 text-white mb-3" style="font-size: 6rem;">500</h1>
            <h2 class="text-white mb-3">Erro Interno do Servidor</h2>
            <p class="text-muted mb-4">
                Algo correu mal no Servidor. A nossa equipa já foi notificada.
                Por favor, tente novamente mais tarde.
            </p>
            <div class="d-flex justify-content-center gap-3">
                <a href="{{ url_for('main.index') }}" class="btn btn-scientific">
                    <i class="fas fa-home me-2"></i>Voltar ao Início
                </a>
                <a href="javascript:location.reload()" class="btn btn-outline-scientific">
                    <i class="fas fa-sync-alt me-2"></i>Tentar Novamente
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
