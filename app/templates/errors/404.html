{% extends "base.html" %}

{% block title %}404 - Página Não Encontrada{% endblock %}

{% block content %}
<div class="row justify-content-center text-center fade-in-up">
    <div class="col-md-8 col-lg-7">
        <div class="card-scientific p-5">
            <div class="mb-4">
                <i class="fas fa-search fa-4x" style="color: var(--cyan);"></i>
            </div>
            <h1 class="display-1 text-white mb-3" style="font-size: 6rem;">404</h1>
            <h2 class="text-white mb-3">Página Não Encontrada</h2>
            <p class="text-muted mb-4">
                A página que procura não existe ou foi movida.
                Verifique o endereço ou volte para o início.
            </p>
            <div class="d-flex justify-content-center gap-3">
                <a href="{{ url_for('main.index') }}" class="btn btn-scientific">
                    <i class="fas fa-home me-2"></i>Voltar ao Início
                </a>
                <a href="javascript:history.back()" class="btn btn-outline-scientific">
                    <i class="fas fa-arrow-left me-2"></i>Voltar
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
