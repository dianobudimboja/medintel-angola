{% extends "base.html" %}

{% block title %}401 - Não Autenticado{% endblock %}

{% block content %}
<div class="row justify-content-center text-center fade-in-up">
    <div class="col-md-8 col-lg-7">
        <div class="card-scientific p-5">
            <div class="mb-4">
                <i class="fas fa-sign-in-alt fa-4x" style="color: var(--warning-orange);"></i>
            </div>
            <h1 class="display-1 text-white mb-3" style="font-size: 6rem;">401</h1>
            <h2 class="text-white mb-3">Não Autenticado</h2>
            <p class="text-muted mb-4">
                Precisa de fazer Login para aceder a esta página.
                Faça Login com as suas credenciais médicas.
            </p>
            <div class="d-flex justify-content-center gap-3">
                <a href="{{ url_for('auth.login') }}" class="btn btn-scientific">
                    <i class="fas fa-sign-in-alt me-2"></i>Fazer Login
                </a>
                <a href="{{ url_for('main.index') }}" class="btn btn-outline-scientific">
                    <i class="fas fa-home me-2"></i>Voltar ao Início
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
